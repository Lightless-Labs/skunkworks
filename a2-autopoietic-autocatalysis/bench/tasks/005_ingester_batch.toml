[task]
title = "Add batch ingestion to Ingester"
description = "Add a pub fn ingest_batch(&self, signals: Vec<RawSignal>) -> Vec<TaskContract> method to Ingester in crates/a2_sensorium/src/ingest.rs that ingests multiple signals at once."

[verify]
command = "cargo test -p a2_sensorium batch"
expect_exit = 0

[setup]
test_file = "crates/a2_sensorium/src/ingest.rs"
test_content = """
#[test]
fn test_batch_ingestion() {
    let budget = Budget { max_tokens: 50_000, max_duration_secs: 300, max_calls: 20 };
    let ingester = Ingester::new(budget);
    let signals = vec![
        RawSignal { origin: "a".into(), content: "task 1".into(), risk_tier: RiskTier::Low, metadata: vec![] },
        RawSignal { origin: "b".into(), content: "task 2".into(), risk_tier: RiskTier::High, metadata: vec![] },
    ];
    let tasks = ingester.ingest_batch(signals);
    assert_eq!(tasks.len(), 2);
    assert!(matches!(tasks[1].priority, Priority::Low)); // high risk = low priority
}
"""
