[task]
title = "Add summary method to SomaticFitness"
description = "Add a pub fn summary(&self) -> String method to SomaticFitness in crates/a2_core/src/protocol.rs that returns a string in the format: \"completed={task_completed} tests={tests_pass} tokens={tokens_used} duration={duration_secs:.1}s\"."

[verify]
command = "cargo test -p a2_core somatic_summary"
expect_exit = 0

[setup]
test_file = "crates/a2_core/src/protocol.rs"
test_content = """
#[test]
fn test_somatic_summary() {
    let f = SomaticFitness {
        task_completed: true,
        tests_pass: true,
        acceptance_met: vec![true, false],
        tokens_used: 500,
        duration_secs: 12.3,
    };
    let s = f.summary();
    assert!(s.contains("completed=true"), "got: {s}");
    assert!(s.contains("tests=true"), "got: {s}");
    assert!(s.contains("tokens=500"), "got: {s}");
    assert!(s.contains("duration=12.3s"), "got: {s}");
}
"""
