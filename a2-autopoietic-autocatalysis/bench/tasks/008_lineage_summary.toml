[task]
title = "Add summary method to FitnessRecord"
description = "Add a pub fn summary(&self) -> String method to FitnessRecord in crates/a2_core/src/protocol.rs that returns a string in the format: \"sentinel={sentinel_score:.0}% mission={mission_score:.0}%\"."

[verify]
command = "cargo test -p a2_core fitness_summary"
expect_exit = 0

[setup]
test_file = "crates/a2_core/src/protocol.rs"
test_content = """
#[test]
fn test_fitness_summary() {
    let f = FitnessRecord { sentinel_score: 0.833, mission_score: 0.5 };
    let s = f.summary();
    assert!(s.contains("sentinel=83%"), "got: {s}");
    assert!(s.contains("mission=50%"), "got: {s}");
}
"""
