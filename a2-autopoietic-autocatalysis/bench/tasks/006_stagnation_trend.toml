[task]
title = "Add trend detection to StagnationDetector"
description = "Add a pub fn trend(&self) -> f64 method to StagnationDetector in crates/a2d/src/lib.rs that returns the average change in promotion_count across consecutive rounds. Positive means improving, negative means declining, zero means flat or insufficient data (fewer than 2 rounds)."

[verify]
command = "cargo test -p a2d trend"
expect_exit = 0

[setup]
test_file = "crates/a2d/src/lib.rs"
test_content = """
#[test]
fn test_stagnation_trend() {
    let mut detector = StagnationDetector::new(5);
    assert!((detector.trend() - 0.0).abs() < f64::EPSILON);
    detector.record_round(10, 1, 1);
    assert!((detector.trend() - 0.0).abs() < f64::EPSILON);
    detector.record_round(10, 1, 3);
    assert!((detector.trend() - 2.0).abs() < f64::EPSILON);
    detector.record_round(10, 1, 2);
    assert!((detector.trend() - 0.5).abs() < f64::EPSILON);
}
"""
