[task]
title = "Add Display impl for RiskTier"
description = "Implement std::fmt::Display for RiskTier in crates/a2_sensorium/src/ingest.rs so that Low displays as \"low\", Medium as \"medium\", and High as \"high\"."

[verify]
command = "cargo test -p a2_sensorium risk_tier_display"
expect_exit = 0

[setup]
test_file = "crates/a2_sensorium/src/ingest.rs"
test_content = """
#[test]
fn test_risk_tier_display() {
    assert_eq!(format!("{}", RiskTier::Low), "low");
    assert_eq!(format!("{}", RiskTier::Medium), "medium");
    assert_eq!(format!("{}", RiskTier::High), "high");
}
"""
