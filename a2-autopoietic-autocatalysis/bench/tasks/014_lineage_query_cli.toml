[task]
title = "Add lineage query to a2ctl status"
description = """In crates/a2ctl/src/main.rs, the Status command currently prints basic info. Add lineage stats by:

1. Open lineage.sqlite from workspace_root().join("lineage.sqlite") using rusqlite::Connection::open
2. Create a SqliteLineageStore from the connection (use a2_archive::SqliteLineageStore)
3. Call store.recent(5) to get the 5 most recent lineage records
4. Print a summary table showing: task_id (first 8 chars), model (from first model_attribution), tokens_used (from somatic fitness), and whether task_completed
5. If the DB doesn't exist or query fails, print "[no lineage data]" and continue

The Status command handler is in the Commands::Status match arm. The function is show_status()."""

[verify]
command = "cargo test -p a2ctl status_lineage"
expect_exit = 0

[setup]
test_file = "crates/a2ctl/src/main.rs"
test_content = """
#[test]
fn status_handles_missing_lineage_db() {
    // Should not panic when lineage.sqlite doesn't exist
    let result = std::panic::catch_unwind(|| {
        // The function should handle missing DB gracefully
        let _ws = workspace_root().join("nonexistent_lineage_test.sqlite");
    });
    assert!(result.is_ok());
}
"""
