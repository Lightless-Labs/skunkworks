[task]
title = "Add a fibonacci function"
description = "Add a pub fn fibonacci(n: u64) -> u64 function to crates/a2_core/src/lib.rs that computes the nth Fibonacci number iteratively."

[verify]
command = "cargo test -p a2_core fibonacci"
expect_exit = 0

[setup]
# Test that must be added for verification
test_file = "crates/a2_core/src/lib.rs"
test_content = """
#[test]
fn test_fibonacci() {
    assert_eq!(fibonacci(0), 0);
    assert_eq!(fibonacci(1), 1);
    assert_eq!(fibonacci(10), 55);
    assert_eq!(fibonacci(20), 6765);
}
"""
