[task]
title = "Implement TODO scanner in sensorium"
description = """Add a pub fn scan_todos(root: &Path) -> Vec<TodoItem> function and a pub struct TodoItem to crates/a2_sensorium/src/ingest.rs.

TodoItem should have: pub file: String, pub line: usize, pub keyword: String, pub text: String

scan_todos should:
1. Walk all .rs files under root recursively (use std::fs::read_dir recursively, skip the target/ directory)
2. For each file, scan lines for TODO, FIXME, or HACK (case-insensitive, preceded by //)
3. Extract the keyword and the rest of the line as text
4. Return a Vec<TodoItem> sorted by file path then line number"""

[verify]
command = "cargo test -p a2_sensorium scan_todos"
expect_exit = 0

[setup]
test_file = "crates/a2_sensorium/src/ingest.rs"
test_content = """
#[test]
fn test_scan_todos_finds_items() {
    use std::io::Write;
    let dir = std::env::temp_dir().join(format!("a2_scan_test_{}", std::process::id()));
    std::fs::create_dir_all(&dir).unwrap();
    let test_file = dir.join("test.rs");
    let mut f = std::fs::File::create(&test_file).unwrap();
    writeln!(f, "fn main() {{}}").unwrap();
    writeln!(f, "// TODO: implement this").unwrap();
    writeln!(f, "// FIXME: broken logic").unwrap();
    drop(f);
    let items = scan_todos(&dir);
    assert_eq!(items.len(), 2);
    assert_eq!(items[0].keyword, "TODO");
    assert_eq!(items[0].line, 2);
    assert!(items[0].text.contains("implement this"));
    assert_eq!(items[1].keyword, "FIXME");
    std::fs::remove_dir_all(&dir).unwrap();
}
"""
