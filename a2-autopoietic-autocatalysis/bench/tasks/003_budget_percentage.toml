[task]
title = "Add budget percentage_used method"
description = "Add a pub fn percentage_used(&self) -> f64 method to BudgetTracker in crates/a2_workcell/src/budget.rs that returns the percentage of token budget consumed (0.0 to 100.0)."

[verify]
command = "cargo test -p a2_workcell budget_percentage"
expect_exit = 0

[setup]
test_file = "crates/a2_workcell/src/budget.rs"
test_content = """
#[test]
fn test_budget_percentage() {
    let tracker = BudgetTracker::new(Budget { max_tokens: 1000, max_duration_secs: 60, max_calls: 10 });
    assert!((tracker.percentage_used() - 0.0).abs() < f64::EPSILON);
    tracker.record_usage(250, 250).unwrap();
    assert!((tracker.percentage_used() - 50.0).abs() < f64::EPSILON);
}
"""
