[task]
title = "Add max_depth to CausalGraph"
description = "Add a pub fn max_depth(&self) -> usize method to CausalGraph in crates/a2_raf/src/graph.rs that returns the length of the longest path (in edges) from any root node (node with no incoming edges) to any other node. Return 0 for an empty graph or a graph with no edges."

[verify]
command = "cargo test -p a2_raf max_depth"
expect_exit = 0

[setup]
test_file = "crates/a2_raf/src/graph.rs"
test_content = """
#[test]
fn test_max_depth() {
    let mut g = CausalGraph::new();
    assert_eq!(g.max_depth(), 0);
    g.add_node("a");
    assert_eq!(g.max_depth(), 0);
    g.add_node("b");
    g.add_node("c");
    g.add_edge("a", "b", 1.0);
    assert_eq!(g.max_depth(), 1);
    g.add_edge("b", "c", 1.0);
    assert_eq!(g.max_depth(), 2);
}
"""
