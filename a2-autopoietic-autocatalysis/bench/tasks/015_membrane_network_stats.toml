[task]
title = "Add network request tracking to PolicyMembrane"
description = """Add request tracking to PolicyMembrane in crates/a2_membrane/src/policy.rs:

1. Add a `request_log: Mutex<Vec<(String, String, bool)>>` field to PolicyMembrane (tool_or_endpoint, workcell_id, allowed)
2. Update new() and permissive() to initialize with empty Mutex<Vec>
3. In the Membrane trait impl's check_tool(), log each check to request_log before returning
4. In the Membrane trait impl's check_network(), log each check to request_log before returning
5. Add a pub fn request_count(&self) -> usize method that returns the total logged requests
6. Add a pub fn denied_count(&self) -> usize method that returns count of denied requests

Use std::sync::Mutex for the log field."""

[verify]
command = "cargo test -p a2_membrane request_tracking"
expect_exit = 0

[setup]
test_file = "crates/a2_membrane/src/policy.rs"
test_content = """
#[test]
fn test_request_tracking() {
    let m = PolicyMembrane::permissive();
    let wc = a2_core::id::WorkcellId::new();
    assert_eq!(m.request_count(), 0);
    let _ = m.check_tool("git", &wc);
    let _ = m.check_tool("cargo", &wc);
    assert_eq!(m.request_count(), 2);
    assert_eq!(m.denied_count(), 0);
}
"""
