[task]
title = "Add model performance stats to Governor"
description = """Add a pub fn model_stats(&self) -> Vec<(String, usize, usize)> method to Governor in crates/a2d/src/lib.rs that returns per-model statistics from the stagnation detector's round history.

1. Add a `model_id: String` field to the private RoundOutcome struct
2. Update record_round() to accept a model_id parameter: pub fn record_round(&mut self, test_count: u64, successful_applies: u64, promotion_count: u64, model_id: &str)
3. Update all callers of record_round (in record_round_outcome) to pass the model ID from the WorkcellResult's patch attribution
4. Implement model_stats() on Governor that groups rounds by model_id and returns (model_id, total_rounds, total_promotions) tuples
5. Fix any tests that call record_round to pass a model_id"""

[verify]
command = "cargo test -p a2d model_stats"
expect_exit = 0

[setup]
test_file = "crates/a2d/src/lib.rs"
test_content = """
#[test]
fn test_model_stats() {
    let mut detector = StagnationDetector::new(10);
    detector.record_round(10, 1, 1, "claude");
    detector.record_round(10, 0, 0, "gemini");
    detector.record_round(10, 1, 1, "claude");
    detector.record_round(10, 0, 0, "gemini");
    let stats = detector.model_stats();
    let claude = stats.iter().find(|(m, _, _)| m == "claude").unwrap();
    let gemini = stats.iter().find(|(m, _, _)| m == "gemini").unwrap();
    assert_eq!(claude.1, 2); // 2 rounds
    assert_eq!(claude.2, 2); // 2 promotions
    assert_eq!(gemini.1, 2); // 2 rounds
    assert_eq!(gemini.2, 0); // 0 promotions
}
"""
