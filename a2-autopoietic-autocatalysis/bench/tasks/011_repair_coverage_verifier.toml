[task]
title = "Make RepairCoverageVerifier functional"
description = """In crates/a2_constitution/src/verifiers.rs, the RepairCoverageVerifier::verify() method currently always returns Ok(()). Make it functional:

1. Add a `min_coverage: f64` field to RepairCoverageVerifier
2. Add a `graph: Arc<a2_raf::graph::CausalGraph>` field (add `use std::sync::Arc;` and the a2_raf dependency)
3. In verify(), call self.graph.repair_coverage() and compare against self.min_coverage
4. Return Ok(()) if coverage >= min_coverage, otherwise return Err(A2Error::ConstitutionalViolation(...)) with a message including the actual and required coverage
5. Update RepairCoverageVerifier::new() to accept both parameters
6. Add a2_raf to the a2_constitution Cargo.toml dependencies"""

[verify]
command = "cargo test -p a2_constitution repair_coverage"
expect_exit = 0

[setup]
test_file = "crates/a2_constitution/src/verifiers.rs"
test_content = """
#[cfg(test)]
mod repair_tests {
    use super::*;
    use a2_core::traits::ConstitutionalVerifier;

    #[test]
    fn test_repair_coverage_verifier_passes_when_sufficient() {
        let mut graph = a2_raf::graph::CausalGraph::new();
        graph.add_node("a");
        graph.add_node("b");
        graph.add_edge("a", "b", 1.0);
        graph.add_edge("b", "a", 1.0);
        let verifier = RepairCoverageVerifier::new(0.5, std::sync::Arc::new(graph));
        assert!(verifier.verify().is_ok());
    }

    #[test]
    fn test_repair_coverage_verifier_fails_when_insufficient() {
        let graph = a2_raf::graph::CausalGraph::new();
        let verifier = RepairCoverageVerifier::new(0.5, std::sync::Arc::new(graph));
        // Empty graph has 0% coverage but also 0 nodes — should pass (no components to cover)
        // Add nodes without edges to force failure
        let mut g = a2_raf::graph::CausalGraph::new();
        g.add_node("orphan");
        let verifier = RepairCoverageVerifier::new(0.5, std::sync::Arc::new(g));
        assert!(verifier.verify().is_err());
    }
}
"""
