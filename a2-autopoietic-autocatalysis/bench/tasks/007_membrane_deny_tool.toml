[task]
title = "Add deny_tool method to PolicyMembrane"
description = "Add a pub fn deny_tool(&mut self, tool_name: &str) method to PolicyMembrane in crates/a2_membrane/src/policy.rs that pushes the given tool name into self.policy.soft_membrane.denied_tools. The denied_tools field is a Vec<String> that already exists on CapabilityMap."

[verify]
command = "cargo test -p a2_membrane deny_tool"
expect_exit = 0

[setup]
test_file = "crates/a2_membrane/src/policy.rs"
test_content = """
#[test]
fn test_deny_tool() {
    let mut membrane = PolicyMembrane::permissive();
    let wc = a2_core::id::WorkcellId::new();
    assert!(membrane.check_tool("dangerous_tool", &wc).is_ok());
    membrane.deny_tool("dangerous_tool");
    assert!(membrane.check_tool("dangerous_tool", &wc).is_err());
}
"""
