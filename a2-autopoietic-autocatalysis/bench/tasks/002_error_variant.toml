[task]
title = "Add a Timeout error variant"
description = "Add a Timeout { duration_secs: f64, operation: String } variant to A2Error in crates/a2_core/src/error.rs with a descriptive error message."

[verify]
command = "cargo test -p a2_core timeout"
expect_exit = 0

[setup]
test_file = "crates/a2_core/src/error.rs"
test_content = """
#[test]
fn test_timeout_error() {
    let err = A2Error::Timeout { duration_secs: 30.0, operation: "model call".into() };
    let msg = format!("{err}");
    assert!(msg.contains("30"));
    assert!(msg.contains("model call"));
}
"""
