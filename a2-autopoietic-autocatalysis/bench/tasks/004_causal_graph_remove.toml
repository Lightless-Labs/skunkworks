[task]
title = "Add remove_node to CausalGraph"
description = "Add a pub fn remove_node(&mut self, id: &str) -> bool method to CausalGraph in crates/a2_raf/src/graph.rs. Returns true if the node existed and was removed, false otherwise. Also removes all edges to/from that node."

[verify]
command = "cargo test -p a2_raf remove_node"
expect_exit = 0

[setup]
test_file = "crates/a2_raf/src/graph.rs"
test_content = """
#[test]
fn test_remove_node() {
    let mut graph = CausalGraph::new();
    graph.add_node("a");
    graph.add_node("b");
    graph.add_edge("a", "b", 1.0);
    assert!(graph.remove_node("a"));
    assert!(!graph.remove_node("a")); // already removed
    assert!(!graph.is_raf_connected());
}
"""
