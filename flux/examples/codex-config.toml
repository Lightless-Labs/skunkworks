# Sketch integration until Codex exposes a stable plugin manifest.
# Wire Flux as a post-turn / post-tool hook command and feed the Codex event JSON on stdin.

[hooks.post_turn]
command = "node"
args = ["/absolute/path/to/flux/dist/src/adapters/codex/hook.js", "--host=codex"]

[hooks.post_tool]
command = "node"
args = ["/absolute/path/to/flux/dist/src/adapters/codex/hook.js", "--host=codex"]
