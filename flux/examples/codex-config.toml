# Prefer installing Flux as a Codex plugin from the skunkworks repo root:
#   codex plugin marketplace add Lightless-Labs/skunkworks --sparse .agents/plugins/marketplace.json --sparse flux
#   codex plugin add flux@lightless-labs-skunkworks
#
# If your Codex build supports direct TOML hook wiring, use the same nested
# matcher-group shape as hooks.json. Command hooks receive JSON on stdin and
# should print Codex hook JSON on stdout.

[[hooks.Stop]]
hooks = [
  { type = "command", command = "node \"/absolute/path/to/flux/scripts/flux-hook-wrapper.mjs\" --host=codex", statusMessage = "Flux sidecar check" },
]

[[hooks.PostToolUse]]
matcher = ""
hooks = [
  { type = "command", command = "node \"/absolute/path/to/flux/scripts/flux-hook-wrapper.mjs\" --host=codex", statusMessage = "Flux sidecar check" },
]
