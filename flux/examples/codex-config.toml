# Prefer installing Flux as a Codex plugin from the skunkworks repo root:
#   codex plugin marketplace add Lightless-Labs/skunkworks --sparse .agents/plugins/marketplace.json --sparse flux
#   codex plugin add flux@lightless-labs-skunkworks
#
# If your Codex build supports direct TOML hook wiring, point it at the same
# safe-fail wrapper used by the plugin manifest.

[hooks.Stop]
command = "node"
args = ["/absolute/path/to/flux/scripts/flux-hook-wrapper.mjs", "--host=codex"]

[hooks.PostToolUse]
command = "node"
args = ["/absolute/path/to/flux/scripts/flux-hook-wrapper.mjs", "--host=codex"]
